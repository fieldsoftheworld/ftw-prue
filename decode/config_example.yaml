trainer:
  max_epochs: 200
  log_every_n_steps: 10
  accelerator: gpu
  default_root_dir: logs/decode-2-class
  devices:
    - 0
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val_loss
        mode: min
        save_top_k: 1
        save_last: true
        filename: "{epoch}-{val_loss:.2f}"
model:
  class_path: ftw_tools.torchgeo.trainers.CustomSemanticSegmentationTask
  init_args:
    loss: "decode"
    model: "decode"
    backbone: "decode"
    weights: null
    in_channels: 4
    num_classes: 2
    ignore_index: 3
    lr: 1e-3
    patience: 10
    presence_only: true
    model_kwargs:
      nfilters_init: 32
      depth: 6
      ftdepth: 5
      psp_depth: 4
      norm_type: "GroupNorm"
      norm_groups: 4
      nheads_start: 4
      seg_weight: 1.0
      bound_weight: 1.0
      dist_weight: 5.0
data:
  class_path: ftw_tools.torchgeo.datamodules.FTWDataModule
  init_args:
    batch_size: 64
    num_workers: 4
    train_countries:
      - austria
      - belgium
      - brazil
      - cambodia
      - corsica
      - croatia
      - denmark
      - estonia
      - finland
      - france
      - germany
      - india
      - kenya
      - latvia
      - lithuania
      - luxembourg
      - netherlands
      - portugal
      - rwanda
      - slovakia
      - slovenia
      - south_africa
      - spain
      - sweden
      - vietnam
    val_countries:
      - austria
      - belgium
      - brazil
      - cambodia
      - corsica
      - croatia
      - denmark
      - estonia
      - finland
      - france
      - germany
      - india
      - kenya
      - latvia
      - lithuania
      - luxembourg
      - netherlands
      - portugal
      - rwanda
      - slovakia
      - slovenia
      - south_africa
      - spain
      - sweden
      - vietnam
    test_countries:
      - austria
      - belgium
      - brazil
      - cambodia
      - corsica
      - croatia
      - denmark
      - estonia
      - finland
      - france
      - germany
      - india
      - kenya
      - latvia
      - lithuania
      - luxembourg
      - netherlands
      - portugal
      - rwanda
      - slovakia
      - slovenia
      - south_africa
      - spain
      - sweden
      - vietnam
  dict_kwargs:
    root: ./data/ftw
    load_boundaries: false
    input_type: "images"
    temporal_options: "stacked"
    preprocessing: "none"
seed_everything: 7

